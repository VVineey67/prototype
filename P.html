<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3; url=https://srirohan.github.io/vgg-new-website/" />
    <title>Redirecting to VG International | Live Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#021c36",
                        secondary: "#0091a2",
                        surface: "#f8f9fb",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Manrope', 'sans-serif'],
                        tech: ['Space Grotesk', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8f9fb; color: #191c1e; }
        .bg-grid {
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(2, 28, 54, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(2, 28, 54, 0.05) 1px, transparent 1px);
        }
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0, 145, 162, 0.2);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: #0091a2;
        }
        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-box {
            background: linear-gradient(145deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.7) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(2, 28, 54, 0.05);
            box-shadow: 0 20px 40px -15px rgba(2, 28, 54, 0.05);
        }
    </style>
</head>
<body class="min-h-screen bg-grid flex items-center justify-center font-sans">
    
    <div class="text-center p-12 max-w-lg glass-box relative overflow-hidden rounded-sm">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-secondary to-transparent opacity-50"></div>
        <div class="mb-8">
            <span class="loader"></span>
        </div>
        <h1 class="text-2xl font-display font-extrabold mb-4 text-primary">Initializing Environment</h1>
        <p class="text-primary/60 text-sm mb-8 font-medium leading-relaxed">
            Connecting to the deployed VGG live prototype. You are being redirected securely.
        </p>
        <a href="https://srirohan.github.io/vgg-new-website/" class="inline-block border border-primary/10 bg-white px-6 py-3 text-xs font-bold tracking-[0.2em] uppercase text-secondary hover:bg-secondary hover:text-white hover:border-secondary transition-all">
            Continue Manually
        </a>
    </div>

</body>
</html>
